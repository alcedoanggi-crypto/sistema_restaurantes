<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; width: 80mm; margin: 0; padding: 5px; }
        .text-center { text-align: center; }
        .header { border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .order-info { font-size: 18px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 1px solid #000; text-align: left; }
        td { padding: 8px 0; font-size: 20px; font-weight: bold; } /* Fuente grande para cocina */
        .footer { margin-top: 20px; border-top: 1px dashed #000; font-size: 12px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body onload="window.print(); window.close();">
    <div class="text-center header">
        <h1 style="margin:0;">COMANDA COCINA</h1>
        <div class="order-info">
            MESA: {{ order.table_id }}<br>
            ORDEN: #{{ order.id }}
        </div>
        <p>Fecha: {{ order.id }}</p> </div>

    <table>
        <thead>
            <tr>
                <th>CANT.</th>
                <th>PRODUCTO</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.quantity }} x</td>
                <td>{{ item.product_name }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="footer text-center">
        <p>Mesero: {{ session['username'] }}</p>
    </div>
</body>
</html>
