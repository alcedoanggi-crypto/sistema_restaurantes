<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; width: 80mm; margin: 0; padding: 5px; }
        .text-center { text-align: center; }
        .header { border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        .order-info { font-size: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px 0; font-size: 24px; font-weight: bold; border-bottom: 1px solid #eee; }
        .footer { margin-top: 20px; text-align: center; font-size: 14px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body onload="window.print(); setTimeout(function(){ window.close(); }, 500);">
    <div class="text-center header">
        <h1 style="margin:0; font-size: 28px;">ORDEN COCINA</h1>
        <div class="order-info">
            MESA: {{ order.table_id }}<br>
            PEDIDO: #{{ order.id }}
        </div>
    </div>

    <table>
        <tbody>
            {% for item in items %}
            <tr>
                <td style="width: 20%;">{{ item.quantity }}</td>
                <td>{{ item.product_name }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="footer">
        <p>Atendido por: {{ session['username'] }}</p>
    </div>
</body>
</html>
